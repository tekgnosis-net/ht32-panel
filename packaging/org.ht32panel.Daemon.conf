<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for ht32paneld.

  The daemon (running as root via ht32-panel.service) needs explicit
  permission to own its well-known name on the system bus; without this
  policy the daemon fails to register on a fresh install. Local clients
  (ht32panelctl, the web UI) may call it and receive its signals.
-->
<busconfig>
  <policy user="root">
    <allow own="org.ht32panel.Daemon"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.ht32panel.Daemon"/>
    <allow receive_sender="org.ht32panel.Daemon"/>
  </policy>
</busconfig>
