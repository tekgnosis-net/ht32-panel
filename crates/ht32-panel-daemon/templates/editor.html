<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HT32 Template Editor</title>
  <link rel="stylesheet" href="/editor/editor.css">
  <!-- Script order matters: widgets.js exposes window.renderWidget; editor.js
       calls it and defines window.editor; Alpine.js scans x-data="editor()" last.
       All three are classic `defer` scripts — deferred scripts execute in strict
       document order, so each is ready before the next initialises. -->
  <script src="/editor/widgets.js" defer></script>
  <script src="/editor/editor.js" defer></script>
  <!-- Alpine.js is vendored + embedded (no CDN, no SRI risk, works offline) -->
  <script src="/editor/alpine.js" defer></script>
</head>
<body>
  <div class="editor" x-data="editor()">
    <div class="topbar">
      <strong>Template</strong>
      <select x-model="name" @change="load()">
        <option value="">— new —</option>
        <template x-for="t in templates" :key="t"><option :value="t" x-text="t"></option></template>
      </select>
      <input x-model="name" placeholder="name" size="14">
      <button @click="save()">Save</button>
      <button @click="activate()">Activate</button>
      <button @click="refreshTruth()">Refresh preview</button>
      <span x-text="status"></span>
    </div>

    <div class="palette">
      <template x-for="k in schema.kinds" :key="k">
        <button @click="addWidget(k)" x-text="'+ ' + k"></button>
      </template>
    </div>

    <div class="canvaswrap">
      <div class="device" :style="deviceStyle()">
        <template x-for="(w,i) in spec.widgets" :key="w.id">
          <div class="widget" :class="{selected:i===sel, warn: warnIds.includes(w.id)}"
               @mousedown="startDrag(i,$event,'move')" :style="widgetStyle(w)">
            <span class="handle" @mousedown.stop="startDrag(i,$event,'resize')"></span>
          </div>
        </template>
      </div>
      <img class="device" :src="truthSrc" :style="deviceStyle()" alt="true preview">
      <div class="warnings" x-show="warnings && warnings.length">
        <template x-for="wn in warnings" :key="wn.widget_id">
          <div class="warnrow" x-text="wn.message"></div>
        </template>
      </div>
    </div>

    <!-- Property panel. Gated by a single x-if, but bindings also go through the
         null-safe `cur` getter (cur?.…) and guarded @input/@change handlers,
         because Alpine re-evaluates a guarded subtree's child bindings one last
         time when `sel` flips to null before x-if tears them down. -->
    <div class="props">
      <template x-if="sel!==null">
        <div>
          <label>id <input :value="cur?.id" @input="if(cur) cur.id = $event.target.value"></label>
          <label>x <input type="number" :value="cur?.rect.x" @input="if(cur){ cur.rect.x = +$event.target.value } refreshTruth(); renderAll()"></label>
          <label>y <input type="number" :value="cur?.rect.y" @input="if(cur){ cur.rect.y = +$event.target.value } refreshTruth(); renderAll()"></label>
          <label>w <input type="number" :value="cur?.rect.w" @input="if(cur){ cur.rect.w = +$event.target.value } refreshTruth(); renderAll()"></label>
          <label>h <input type="number" :value="cur?.rect.h" @input="if(cur){ cur.rect.h = +$event.target.value } refreshTruth(); renderAll()"></label>

          <!-- bar / gauge: numeric source -->
          <template x-if="['bar','gauge'].includes(cur?.kind)">
            <label>source
              <select @change="if(cur) cur.value = $event.target.value; refreshTruth(); renderAll()">
                <template x-for="s in schema.number_sources" :key="s"><option :value="s" x-text="s" :selected="cur?.value === s"></option></template>
              </select>
            </label>
          </template>

          <!-- Part B: colour controls for bar (fill, bg) -->
          <template x-if="cur?.kind==='bar'">
            <div>
              <label>fill
                <select @change="setColorSlot('fill', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('fill') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('fill') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('fill')">
                  <input type="color" :value="colorHex('fill')" @input="setColorHex('fill', $event.target.value)">
                </template>
              </label>
              <label>bg
                <select @change="setColorSlot('bg', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('bg') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('bg') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('bg')">
                  <input type="color" :value="colorHex('bg')" @input="setColorHex('bg', $event.target.value)">
                </template>
              </label>
            </div>
          </template>

          <!-- Part B: colour controls for gauge (color, track) -->
          <template x-if="cur?.kind==='gauge'">
            <div>
              <label>color
                <select @change="setColorSlot('color', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('color') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('color') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('color')">
                  <input type="color" :value="colorHex('color')" @input="setColorHex('color', $event.target.value)">
                </template>
              </label>
              <label>track
                <select @change="setColorSlot('track', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('track') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('track') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('track')">
                  <input type="color" :value="colorHex('track')" @input="setColorHex('track', $event.target.value)">
                </template>
              </label>
            </div>
          </template>

          <!-- Part B: colour controls for sparkline (color_a, color_b, bg) -->
          <template x-if="cur?.kind==='sparkline'">
            <div>
              <label>color a
                <select @change="setColorSlot('color_a', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('color_a') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('color_a') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('color_a')">
                  <input type="color" :value="colorHex('color_a')" @input="setColorHex('color_a', $event.target.value)">
                </template>
              </label>
              <label>color b
                <select @change="setColorSlot('color_b', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('color_b') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('color_b') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('color_b')">
                  <input type="color" :value="colorHex('color_b')" @input="setColorHex('color_b', $event.target.value)">
                </template>
              </label>
              <label>bg
                <select @change="setColorSlot('bg', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('bg') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('bg') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('bg')">
                  <input type="color" :value="colorHex('bg')" @input="setColorHex('bg', $event.target.value)">
                </template>
              </label>
            </div>
          </template>

          <!-- Part B: colour controls for clock (color) -->
          <template x-if="cur?.kind==='clock'">
            <label>color
              <select @change="setColorSlot('color', $event.target.value)">
                <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('color') === s"></option></template>
                <option value="custom" :selected="colorSelectVal('color') === 'custom'">custom…</option>
              </select>
              <template x-if="colorIsCustom('color')">
                <input type="color" :value="colorHex('color')" @input="setColorHex('color', $event.target.value)">
              </template>
            </label>
          </template>

          <!-- Part C: text widget — source + fmt + colour -->
          <template x-if="cur?.kind==='text'">
            <div>
              <label>text source
                <select @change="setTextSrc($event.target.value)">
                  <template x-for="s in schema.text_sources" :key="s"><option :value="s" x-text="s" :selected="cur?.value?.src === s"></option></template>
                </select>
              </label>

              <!-- literal: free-text input -->
              <template x-if="cur?.value?.src==='literal'">
                <label>text
                  <input type="text" :value="cur?.value?.fmt" @input="if(cur) cur.value.fmt = $event.target.value; refreshTruth(); renderAll()">
                </label>
              </template>

              <!-- time: format dropdown -->
              <template x-if="cur?.value?.src==='time'">
                <label>format
                  <select @change="if(cur) cur.value.fmt = $event.target.value; refreshTruth(); renderAll()">
                    <template x-for="f in schema.time_fmts" :key="f"><option :value="f" x-text="f" :selected="cur?.value?.fmt === f"></option></template>
                  </select>
                </label>
              </template>

              <!-- date: format dropdown -->
              <template x-if="cur?.value?.src==='date'">
                <label>format
                  <select @change="if(cur) cur.value.fmt = $event.target.value; refreshTruth(); renderAll()">
                    <template x-for="f in schema.date_fmts" :key="f"><option :value="f" x-text="f" :selected="cur?.value?.fmt === f"></option></template>
                  </select>
                </label>
              </template>

              <!-- number: source + style dropdowns -->
              <template x-if="cur?.value?.src==='number'">
                <div>
                  <label>data source
                    <select @change="if(cur) cur.value.fmt.source = $event.target.value; refreshTruth(); renderAll()">
                      <template x-for="s in schema.number_sources" :key="s"><option :value="s" x-text="s" :selected="cur?.value?.fmt?.source === s"></option></template>
                    </select>
                  </label>
                  <label>style
                    <select @change="if(cur) cur.value.fmt.style = $event.target.value; refreshTruth(); renderAll()">
                      <template x-for="f in schema.number_fmts" :key="f"><option :value="f" x-text="f" :selected="cur?.value?.fmt?.style === f"></option></template>
                    </select>
                  </label>
                </div>
              </template>

              <!-- Part B: colour for text widget -->
              <label>color
                <select @change="setColorSlot('color', $event.target.value)">
                  <template x-for="s in schema.theme_slots" :key="s"><option :value="s" x-text="s" :selected="colorSelectVal('color') === s"></option></template>
                  <option value="custom" :selected="colorSelectVal('color') === 'custom'">custom…</option>
                </select>
                <template x-if="colorIsCustom('color')">
                  <input type="color" :value="colorHex('color')" @input="setColorHex('color', $event.target.value)">
                </template>
              </label>
            </div>
          </template>

          <button @click="spec.widgets.splice(sel,1); sel=null; refreshTruth(); renderAll()">Delete widget</button>
        </div>
      </template>
    </div>
  </div>
</body>
</html>
